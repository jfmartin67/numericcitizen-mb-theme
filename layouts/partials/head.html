<meta charset="utf-8">
<script>
  // Apply saved theme immediately to prevent flash
  (function(){var t=localStorage.getItem('nc-theme');if(t==='light')document.documentElement.classList.add('nc-light');else if(t==='dark')document.documentElement.classList.add('nc-dark');})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ with .Title }}{{ . }} — {{ end }}{{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.bio }}{{ . }}{{ end }}{{ end }}">

<link rel="canonical" href="{{ .Permalink }}">

<!-- IndieWeb endpoints -->
<link rel="authorization_endpoint" href="https://micro.blog/indieauth/auth">
<link rel="token_endpoint" href="https://micro.blog/indieauth/token">
<link rel="micropub" href="https://micro.blog/micropub">
<link rel="webmention" href="https://micro.blog/webmention">
<link rel="pingback" href="https://micro.blog/pingback">

<!-- Feeds -->
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}feed.xml">
<link rel="alternate" type="application/json" title="{{ .Site.Title }}" href="{{ .Site.BaseURL }}feed.json">

<link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css?v={{ .Site.Data.version | default "0.9.21" }}">

<!-- Micro.blog plugin stylesheets -->
{{ range .Site.Params.plugins_css -}}
<link rel="stylesheet" href="{{ . }}">
{{- end }}

<!-- Micro.blog plugin HTML partials -->
{{ range $filename := .Site.Params.plugins_html -}}
{{ partial $filename $ }}
{{- end }}

<!-- Micro.blog custom CSS (Design → Edit CSS) -->
<link rel="stylesheet" href="{{ "custom.css" | relURL }}?{{ .Site.Params.theme_seconds }}">

{{ with .Site.Params.favicon -}}
<link rel="icon" href="{{ . }}">
{{- end }}
